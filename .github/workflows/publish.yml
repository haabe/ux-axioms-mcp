name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Never run two releases at once — a queued run would bump on top of an
# in-flight one and race the npm publish.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need a real ref (not detached HEAD) so we can push the bump back.
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Install and enable Corepack
        run: |
          npm install -g corepack
          corepack enable
          corepack --version
          pnpm -v || true
      - name: Activate pnpm from packageManager
        run: |
          corepack prepare pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]") --activate
          pnpm -v
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify CLI shebang
        run: |
          test -f dist/scripts/mcp.js
          head -n1 dist/scripts/mcp.js | grep -Fx '#!/usr/bin/env node'
      - run: pnpm run --if-present test
      - name: Bump patch version, commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Creates the commit + vX.Y.Z tag. The default GITHUB_TOKEN push does
          # not re-trigger workflows, and [skip ci] guards self-hosted runners too.
          npm version patch -m "chore: release v%s [skip ci]"
          git push --follow-tags origin HEAD:main
      - run: npm publish --access public
