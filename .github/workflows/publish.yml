name: Publish Package

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version-check.outputs.should_publish }}
      local_version: ${{ steps.version-check.outputs.local_version }}
    steps:
      - uses: actions/checkout@v6
      - id: version-check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          echo "local_version=$LOCAL" >> "$GITHUB_OUTPUT"

          # If triggered by a tag push, always publish
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Tag push detected — will publish v$LOCAL"
            exit 0
          fi

          # Otherwise compare to npm registry
          PUBLISHED=$(npm view ux-axioms-mcp version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL, Published: $PUBLISHED"

          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged — skipping publish"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "New version detected — will publish v$LOCAL"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - name: Install and enable Corepack
        run: |
          npm install -g corepack
          corepack enable
          corepack --version
          pnpm -v || true
      - name: Activate pnpm from packageManager
        run: |
          corepack prepare pnpm@$(node -p "require('./package.json').packageManager.split('@')[1]") --activate
          pnpm -v
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify CLI shebang
        run: |
          test -f dist/scripts/mcp.js
          head -n1 dist/scripts/mcp.js | grep -Fx '#!/usr/bin/env node'
      - run: pnpm run --if-present test
      - name: Create git tag if missing
        run: |
          VERSION=${{ needs.check-version.outputs.local_version }}
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag v$VERSION"
          else
            echo "Tag v$VERSION already exists"
          fi
      - run: npm publish --access public
